name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    name: Verify release inputs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run Go tests
        run: go test ./...

  build-go:
    name: Build Go binaries (${{ matrix.goos }}-${{ matrix.goarch }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - runner: ubuntu-latest
            goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
          - runner: ubuntu-latest
            goos: windows
            goarch: arm64
            ext: .exe
            archive: zip
          # Go 的 darwin 产物可在 Linux runner 交叉编译，避免 macOS runner 队列阻塞。
          - runner: ubuntu-latest
            goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - runner: ubuntu-latest
            goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BIN_EXT: ${{ matrix.ext }}
          ARCHIVE: ${{ matrix.archive }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist package
          binary="clip2agent${BIN_EXT}"
          version="${VERSION#v}"
          asset="clip2agent_${version}_${GOOS}_${GOARCH}.${ARCHIVE}"

          go build -trimpath -ldflags="-s -w" -o "dist/${binary}" ./cmd/clip2agent

          cp README.md LICENSE package/
          cp "dist/${binary}" package/

          if [ "${ARCHIVE}" = "zip" ]; then
            (cd package && zip -q -r "../dist/${asset}" .)
          else
            tar -C package -czf "dist/${asset}" .
          fi

          rm "dist/${binary}"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  build-swift-helpers:
    name: Build macOS helpers
    needs: verify
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and package Swift helpers (arm64 + amd64)
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version="${VERSION#v}"

          mkdir -p dist

          build_one() {
            arch="$1"   # arm64|amd64
            sarch="$2"  # arm64|x86_64 (swift arch)
            wrapper="$3" # "" or "arch -x86_64"

            echo "==> Building Swift helpers for ${arch} (${sarch})"
            if [ -n "$wrapper" ]; then
              # Ensure Rosetta is available (best-effort)
              if ! arch -x86_64 /usr/bin/true 2>/dev/null; then
                echo "==> Installing Rosetta (best-effort)"
                sudo softwareupdate --install-rosetta --agree-to-license || true
              fi
            fi

            # Build for this architecture.
            if [ -n "$wrapper" ]; then
              arch -x86_64 swift build -c release --package-path native/macos --arch "$sarch"
              bin_path=$(arch -x86_64 swift build -c release --package-path native/macos --arch "$sarch" --show-bin-path)
            else
              swift build -c release --package-path native/macos --arch "$sarch"
              bin_path=$(swift build -c release --package-path native/macos --arch "$sarch" --show-bin-path)
            fi

            echo "==> Swift bin path: ${bin_path}"
            if [ ! -f "${bin_path}/clip2agent-macos" ] || [ ! -f "${bin_path}/clip2agent-hotkey" ]; then
              echo "==> Missing expected binaries in ${bin_path}"
              ls -la "${bin_path}" || true
              exit 1
            fi

            pkg_dir="package-${arch}"
            rm -rf "$pkg_dir"
            mkdir -p "$pkg_dir"
            cp README.md LICENSE "$pkg_dir"/
            cp "${bin_path}/clip2agent-macos" "$pkg_dir"/
            cp "${bin_path}/clip2agent-hotkey" "$pkg_dir"/

            asset="clip2agent_${version}_darwin_${arch}_helpers.tar.gz"
            tar -C "$pkg_dir" -czf "dist/${asset}" .
          }

          build_one arm64 arm64 ""
          build_one amd64 x86_64 "arch -x86_64"

      - name: Upload helper assets
        uses: actions/upload-artifact@v4
        with:
          name: release-swift-helpers
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - build-go
      - build-swift-helpers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Add installer script
        run: |
          cp scripts/install.sh release-assets/install.sh
          cp scripts/uninstall.sh release-assets/uninstall.sh

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
